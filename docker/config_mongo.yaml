version: "1.0"

services:
  mongo:
    image: mongo:latest
    command: sh -c "mongod --quiet --bind_ip_all > /dev/null 2>&1"
    networks:
      app_net:
        ipv4_address: 172.20.0.3
    logging:
        driver: "none"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "21701:21701"

  server:
    build:
      context: ..
      dockerfile: /home/vsuraev/distributed_logger/docker/server_mongo.Dockerfile
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "7777:7777"
    networks:
      app_net:
        ipv4_address: 172.20.0.4
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x distr_logger > /dev/null"]
      interval: 10s
      timeout: 10s
      start_period: 1h
      retries: 999

  client:
    build:
      context: ..
      dockerfile: /home/vsuraev/distributed_logger/docker/client.Dockerfile
    depends_on:
      server:
        condition: service_healthy
    networks:
      app_net:
        ipv4_address: 172.20.0.5

networks:
  app_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
